name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          arch: 'win64_msvc2022_64'
          cache: true

      - name: Set up MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Install Qt (Linux/macOS)
        if: runner.os != 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.2'
          cache: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 \
            libxcb-xkb1 libdbus-1-3 \
            libfuse2 file imagemagick librsvg2-bin

      - name: Download linuxdeploy tools
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: cmake -B build -S src -DCMAKE_BUILD_TYPE=Release -G "Ninja" -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          # AGL.framework больше не поставляется в новых Xcode/macOS SDK
          # (устаревший фреймворк для legacy OpenGL), поэтому
          # -weak_framework AGL больше не нужен и ломает линковку
          # ("framework 'AGL' not found") - используем обычную конфигурацию.
          cmake -B build -S src -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          
      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux) - AppImage
        if: runner.os == 'Linux'
        run: |
          echo -e "[Desktop Entry]\nType=Application\nName=Cremniy\nExec=cremniy\nIcon=cremniy\nCategories=Utility;" > cremniy.desktop

          rsvg-convert src/resources/icons/icon.svg -w 256 -h 256 -o cremniy.png

          export QML_SOURCES_PATHS=${{ github.workspace }}/src

          ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run \
            --appdir AppDir \
            --executable build/cremniy \
            --desktop-file cremniy.desktop \
            --icon-file cremniy.png \
            --plugin qt \
            --output appimage
          mv Cremniy-*.AppImage cremniy-linux-${{ github.ref_name }}.AppImage || mv cremniy-*.AppImage cremniy-linux-${{ github.ref_name }}.AppImage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          # Убираем /Release/ из пути, так как Ninja кладет бинарник прямо в build
          if (!(Test-Path "build/cremniy.exe")) {
            throw "build/cremniy.exe was not produced"
          }
          Copy-Item build/cremniy.exe package/
          
          New-Item -ItemType Directory -Path "package/Resources/translations" -Force
          Copy-Item build/*.qm "package/Resources/translations/"
          
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations package\cremniy.exe
          Compress-Archive -Path package/* -DestinationPath cremniy-windows-${{ github.ref_name }}.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          cp -r build/cremniy.app package/
          macdeployqt package/cremniy.app
          cd package
          tar -czf ../cremniy-macos-${{ github.ref_name }}.tar.gz cremniy.app

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cremniy-${{ runner.os }}-${{ github.ref_name }}
          path: |
            cremniy-linux-${{ github.ref_name }}.AppImage
            cremniy-windows-${{ github.ref_name }}.zip
            cremniy-macos-${{ github.ref_name }}.tar.gz
          if-no-files-found: error

  build-rpm:
    name: Build RPM (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - name: Install git (required before checkout)
        run: dnf install -y git tar
        
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build rpmdevtools git tar rsync \
            cmake gcc-c++ \
            qt6-qtbase-devel qt6-qttools-devel qt6-qtsvg-devel \
            desktop-file-utils

      - name: Setup rpmbuild tree
        run: rpmdev-setuptree
        
      - name: Sync spec version with tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^Version:.*/Version:        ${TAG_VERSION}/" rpm/cremniy.spec
          echo "version=${TAG_VERSION}" >> "$GITHUB_ENV"

      - name: Build source tarball
        run: |
          STAGE_DIR="$(mktemp -d)/cremniy"
          mkdir -p "$STAGE_DIR"
          rsync -a --exclude='.git' ./ "$STAGE_DIR/"
          tar -C "$(dirname "$STAGE_DIR")" -czf \
            "$HOME/rpmbuild/SOURCES/cremniy-${{ env.version }}.tar.gz" cremniy

      - name: Copy spec file
        run: cp rpm/cremniy.spec "$HOME/rpmbuild/SPECS/"

      - name: Build RPM
        run: |
            echo '%debug_package %{nil}' >> ~/.rpmmacros
            rpmbuild -bb "$HOME/rpmbuild/SPECS/cremniy.spec"

      - name: Rename RPMs for clarity
        run: |
          mkdir -p dist
          find "$HOME/rpmbuild/RPMS" -name '*.rpm' -exec cp {} dist/ \;
          find "$HOME/rpmbuild/SRPMS" -name '*.rpm' -exec cp {} dist/ \;

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: cremniy-rpm-${{ github.ref_name }}
          path: dist/*.rpm
          if-no-files-found: error

  release:
    name: Create Release
    needs:
      - build
      - build-rpm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
